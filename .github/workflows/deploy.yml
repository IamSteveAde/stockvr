name : Deploy to intarserver vps

on: 
    push: 
        branches: [main]
    workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          set -e

          APP_DIR="stockVarBackend"
          APP_NAME="backend"
          LOG_FILE="/home/chigozie/deployApi.log"

          log() {
              echo "[$(date +'%Y-%m-%d %H:%M:%S')] $1" | tee -a "$LOG_FILE"
          }

          log "🚀 Starting deployment as user: $(whoami)"
          cd $APP_DIR

          git add . | tee -a "$LOG_FILE"

          git commit -m "from server" | tee -a "$LOG_FILE"

          log "📥 Pulling latest code..."
          git pull origin main 2>&1 | tee -a "$LOG_FILE"

          log "📦 Installing dependencies..."
          bun install 2>&1 | tee -a "$LOG_FILE"

          log "db Sync in progress"
          bun run dbPush

          log "🔄 Restarting application..."
          pm2 restart $APP_NAME 2>&1 | tee -a "$LOG_FILE"

          log "✅ Deployment complete!"